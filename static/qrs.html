<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquateam Taller — QRs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #f4f4f4;
    --surface: #ffffff;
    --border: #e0e0e0;
    --accent: #f97316;
    --text: #1a1a1a;
    --text-muted: #737373;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .logo { font-size: 1.2rem; font-weight: bold; color: var(--accent); letter-spacing: 2px; }
  .logo span { color: var(--text-muted); font-size: 0.75rem; display: block; }
  .nav-links { display: flex; gap: 8px; }
  .nav-links a {
    color: var(--text-muted); text-decoration: none; font-size: 0.8rem;
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px;
    transition: all 0.2s; background: var(--surface);
  }
  .nav-links a:hover { border-color: var(--accent); color: var(--accent); }

  .btn-print {
    background: var(--accent); color: #fff; border: none;
    padding: 10px 20px; border-radius: 4px; font-family: 'Courier New', monospace;
    font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(249,115,22,0.25);
  }
  .btn-print:hover { background: #ea6c0a; }

  main { padding: 24px 20px; max-width: 1200px; margin: 0 auto; }
  .section-title {
    font-size: 0.75rem; color: var(--text-muted); letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 20px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
  }

  .qr-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .qr-item.admin-item { border-color: var(--text-muted); border-style: dashed; }
  .qr-item.stock-item { border-color: var(--accent); }

  .qr-canvas { background: #fff; padding: 8px; border-radius: 4px; border: 1px solid var(--border); }
  .qr-label {
    font-size: 1.4rem; font-weight: bold; color: var(--accent);
    letter-spacing: 3px; text-align: center;
  }
  .qr-sublabel { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 1px; text-align: center; }
  .admin-badge {
    font-size: 0.6rem; background: var(--text-muted); color: #fff;
    padding: 2px 6px; border-radius: 3px; letter-spacing: 1px;
  }

  .qr-section-header {
    grid-column: 1 / -1;
    font-size: 0.7rem; color: var(--text-muted); letter-spacing: 3px;
    text-transform: uppercase; padding: 12px 0 4px;
    border-top: 1px solid var(--border); margin-top: 8px;
  }
  .qr-section-header:first-child { border-top: none; margin-top: 0; padding-top: 0; }

  @media print {
    header, .btn-print { display: none !important; }
    body { background: #fff; }
    main { padding: 8px; }
    .section-title { color: #666; border-color: #ccc; }
    .qr-item { background: #fff; border: 1px solid #ccc; break-inside: avoid; box-shadow: none; }
    .qr-label { color: #000; }
    .qr-sublabel { color: #666; }
    .qr-section-header { color: #999; border-color: #ddd; }
    .admin-badge { background: #999; }
    .qr-grid { gap: 12px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">AQUATEAM <span>CÓDIGOS QR — TALLER</span></div>
  <div class="nav-links">
    <a href="/">← TALLER</a>
    <a href="/stock">📦 STOCK</a>
  </div>
  <button class="btn-print" onclick="window.print()">🖨 IMPRIMIR TODO</button>
</header>

<main>
  <div class="section-title">QR POR PUESTO (4–20) + PÁGINAS DE GESTIÓN</div>
  <div class="qr-grid" id="qr-grid"></div>
</main>

<script>
const base = `${location.protocol}//${location.host}`;
const grid = document.getElementById('qr-grid');

function addSectionHeader(text) {
  const h = document.createElement('div');
  h.className = 'qr-section-header';
  h.textContent = text;
  grid.appendChild(h);
}

function makeQR(url, label, sublabel, extraClass = '', adminBadge = false) {
  const item = document.createElement('div');
  item.className = `qr-item${extraClass ? ' ' + extraClass : ''}`;

  const canvas = document.createElement('div');
  canvas.className = 'qr-canvas';

  const labelEl = document.createElement('div');
  labelEl.className = 'qr-label';
  labelEl.textContent = label;

  const subEl = document.createElement('div');
  subEl.className = 'qr-sublabel';
  subEl.textContent = sublabel;

  item.appendChild(canvas);
  item.appendChild(labelEl);
  item.appendChild(subEl);

  if (adminBadge) {
    const badge = document.createElement('div');
    badge.className = 'admin-badge';
    badge.textContent = 'SOLO ADMIN';
    item.appendChild(badge);
  }

  grid.appendChild(item);

  new QRCode(canvas, {
    text: url,
    width: 128, height: 128,
    colorDark: '#000000', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M,
  });
}

// Puestos 4–20
addSectionHeader('PUESTOS DE TRABAJO');
for (let n = 4; n <= 20; n++) {
  makeQR(`${base}/puesto/${n}`, String(n).padStart(2, '0'), `PUESTO ${n}`);
}

// Gestión
addSectionHeader('PÁGINAS DE GESTIÓN');
makeQR(`${base}/`, '🏠', 'INICIO — TODOS LOS PUESTOS', 'stock-item');
makeQR(`${base}/stock`, '📦', 'STOCK GUARDIAS', 'stock-item');
makeQR(`${base}/historial`, '📋', 'HISTORIAL', 'admin-item', true);
makeQR(`${base}/tecnicos`, '⚙️', 'TÉCNICOS', 'admin-item', true);
</script>
</body>
</html>
